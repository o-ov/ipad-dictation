<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>听写应用</title>
<style>
body { margin: 0; padding: 0; }
iframe { width: 100vw; height: 100vh; border: none; }
</style>
</head>
<body>
<script>
fetch("https://raw.githubusercontent.com/o-ov/ipad-dictation/main/dictation.html")
  .then(r => r.text())
  .then(html => {
    document.open();
    document.write(html);
    document.close();
  })
  .catch(e => document.body.innerHTML = "<h2>加载失败，请检查网络</h2>");
</script>
</body>
</html>
